name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.18'
          otp-version: '27'

      - name: Restore deps cache
        uses: actions/cache@v4
        with:
          key: deps-${{ hashFiles('mix.lock') }}
          restore-keys: deps-
          path: deps

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          key: build-${{ hashFiles('mix.lock') }}
          restore-keys: build-
          path: _build

      - name: Install dependencies
        run: mix deps.get

      - name: Check formatting
        run: mix format --check-formatted

      - name: Credo
        run: mix credo --strict

      - name: Compile
        run: mix compile --warnings-as-errors

      - name: Tests with coverage
        run: mix test --cover

  dialyzer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.18'
          otp-version: '27'

      - name: Restore deps cache
        uses: actions/cache@v4
        with:
          key: deps-${{ hashFiles('mix.lock') }}
          restore-keys: deps-
          path: deps

      - name: Restore PLT cache
        uses: actions/cache@v4
        with:
          key: plt-elixir1.18-otp27-${{ hashFiles('mix.lock') }}
          restore-keys: plt-elixir1.18-otp27-
          path: _build/dev/*plt*

      - name: Install dependencies
        run: mix deps.get

      - name: Dialyzer
        run: MIX_ENV=dev mix dialyzer
